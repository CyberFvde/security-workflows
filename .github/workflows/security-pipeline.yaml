name: Security Pipeline
on:
  workflow_call:
    inputs:
      scan_container:
        required: false
        type: boolean
        default: false
      dockerfile_path:
        required: false
        type: string
        default: "."
      iac_directory:
        required: false
        type: string
        default: "."
      semgrep_rules:
        required: false
        type: string
        default: "p/owasp-top-ten"

# THIS IS THE FIX: Explicitly grant the pipeline permission to post security alerts
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: "🔑 Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified

  sca:
    name: "📦 Dependency Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
      
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4   # Bumped to v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  sast:
    name: "🔍 SAST"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: ${{ inputs.semgrep_rules }}
          generateSarif: "1"
      
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4   # Bumped to v4
        if: always()
        with:
          sarif_file: "semgrep.sarif"

  iac-scan:
    name: "🏗️ IaC Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ inputs.iac_directory }}
          soft_fail: false
          framework: terraform,cloudformation,kubernetes,dockerfile
          check: "HIGH"
          output_format: "sarif"
          output_file_path: "checkov.sarif"
      
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4   # Bumped to v4
        if: always()
        with:
          sarif_file: "checkov.sarif"
